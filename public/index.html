<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prime Number Calculator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      text-align: center;
      padding: 40px 20px 20px;
    }

    .header h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #00f5a0, #00d9f5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .header p { color: #666; font-size: 0.85rem; }

    .settings {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 10px 20px 20px;
      align-items: center;
    }

    .settings label { color: #888; font-size: 0.8rem; }

    .settings input {
      background: #1a1a2e;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 6px 12px;
      border-radius: 6px;
      width: 120px;
      font-family: inherit;
      font-size: 0.85rem;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 0 20px 30px;
      flex-wrap: wrap;
    }

    button {
      padding: 14px 32px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-server { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
    .btn-server:hover:not(:disabled) { box-shadow: 0 0 25px rgba(102, 126, 234, 0.5); }
    .btn-local { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
    .btn-local:hover:not(:disabled) { box-shadow: 0 0 25px rgba(245, 87, 108, 0.5); }
    .btn-both { background: linear-gradient(135deg, #4facfe, #00f2fe); color: #0a0a0f; }
    .btn-both:hover:not(:disabled) { box-shadow: 0 0 25px rgba(79, 172, 254, 0.5); }
    .btn-stop { background: linear-gradient(135deg, #f44336, #d32f2f); color: white; }
    .btn-stop:hover:not(:disabled) { box-shadow: 0 0 25px rgba(244, 67, 54, 0.5); }

    .panels {
      display: flex;
      gap: 20px;
      padding: 0 20px;
      width: 100%;
      max-width: 900px;
      justify-content: center;
    }

    .panel {
      background: #12121a;
      border: 1px solid #1e1e2e;
      border-radius: 16px;
      padding: 30px;
      flex: 1;
      max-width: 420px;
      display: none;
    }

    .panel.active { display: block; }

    .panel-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-server .panel-label { color: #667eea; }
    .panel-local .panel-label { color: #f5576c; }

    .indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #333;
    }

    .indicator.running {
      background: #00f5a0;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 14px 0;
      border-bottom: 1px solid #1a1a2e;
    }

    .stat-row:last-child { border-bottom: none; }

    .stat-label {
      color: #555;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-value {
      font-size: 1.6rem;
      font-weight: 700;
      color: #e0e0e0;
    }

    .stat-value.time { color: #00f5a0; }
    .stat-value.count { color: #4facfe; }
    .stat-value.rate { color: #f5a623; }
    .stat-value.status-done { color: #00f5a0; }
    .stat-value.status-running { color: #f5a623; }
    .stat-value.status-idle { color: #555; }

    @media (max-width: 768px) {
      .panels { flex-direction: column; align-items: center; }
      .header h1 { font-size: 1.5rem; }
      button { padding: 12px 22px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Prime Number Calculator</h1>
    <p>Server vs. Browser vs. Both &mdash; pure speed</p>
  </div>

  <div class="settings">
    <label>Count: <input type="number" id="limitInput" value="10000" min="1"></label>
  </div>

  <div class="controls">
    <button class="btn-server" onclick="startServer()">Server (Vercel)</button>
    <button class="btn-local" onclick="startLocal()">Browser (Local)</button>
    <button class="btn-both" onclick="startBoth()">Both (Race!)</button>
    <button class="btn-stop" onclick="stopAll()">Stop</button>
  </div>

  <div class="panels" id="panels">
    <div class="panel panel-server" id="serverPanel">
      <div class="panel-label"><div class="indicator" id="serverIndicator"></div> Server</div>
      <div class="stat-row">
        <div class="stat-label">Stopwatch</div>
        <div class="stat-value time" id="serverTime">0.000s</div>
      </div>
      <div class="stat-row">
        <div class="stat-label">Primes Found</div>
        <div class="stat-value count" id="serverCount">0</div>
      </div>
      <div class="stat-row">
        <div class="stat-label">Primes / Second</div>
        <div class="stat-value rate" id="serverRate">0</div>
      </div>
      <div class="stat-row">
        <div class="stat-label">Status</div>
        <div class="stat-value status-idle" id="serverStatus">Idle</div>
      </div>
    </div>

    <div class="panel panel-local" id="localPanel">
      <div class="panel-label"><div class="indicator" id="localIndicator"></div> Browser</div>
      <div class="stat-row">
        <div class="stat-label">Stopwatch</div>
        <div class="stat-value time" id="localTime">0.000s</div>
      </div>
      <div class="stat-row">
        <div class="stat-label">Primes Found</div>
        <div class="stat-value count" id="localCount">0</div>
      </div>
      <div class="stat-row">
        <div class="stat-label">Primes / Second</div>
        <div class="stat-value rate" id="localRate">0</div>
      </div>
      <div class="stat-row">
        <div class="stat-label">Status</div>
        <div class="stat-value status-idle" id="localStatus">Idle</div>
      </div>
    </div>
  </div>

  <script>
    let serverAbort = null;
    let localWorker = null;
    let serverRunning = false;
    let localRunning = false;
    let serverTimer = null;
    let localTimer = null;
    let serverStart = 0;
    let localStart = 0;

    function getLimit() {
      return Math.max(parseInt(document.getElementById('limitInput').value) || 10000, 1);
    }

    function showPanel(id) {
      document.getElementById(id).classList.add('active');
    }

    function formatTime(ms) {
      if (ms < 1000) return ms.toFixed(0) + 'ms';
      return (ms / 1000).toFixed(3) + 's';
    }

    function formatNumber(n) {
      return n.toLocaleString();
    }

    function startStopwatch(prefix) {
      const startTime = performance.now();
      if (prefix === 'server') serverStart = startTime;
      else localStart = startTime;

      const timerId = setInterval(() => {
        const elapsed = performance.now() - startTime;
        document.getElementById(`${prefix}Time`).textContent = formatTime(elapsed);
      }, 16); // ~60fps update

      if (prefix === 'server') serverTimer = timerId;
      else localTimer = timerId;
    }

    function stopStopwatch(prefix) {
      if (prefix === 'server' && serverTimer) { clearInterval(serverTimer); serverTimer = null; }
      if (prefix === 'local' && localTimer) { clearInterval(localTimer); localTimer = null; }
    }

    function updateStats(prefix, count, startTime) {
      const elapsed = performance.now() - startTime;
      document.getElementById(`${prefix}Count`).textContent = formatNumber(count);
      const rate = elapsed > 0 ? Math.round(count / (elapsed / 1000)) : 0;
      document.getElementById(`${prefix}Rate`).textContent = formatNumber(rate);
    }

    function setStatus(prefix, status) {
      const el = document.getElementById(`${prefix}Status`);
      el.textContent = status;
      el.className = 'stat-value ' + (
        status === 'Idle' ? 'status-idle' :
        status.startsWith('Done') ? 'status-done' : 'status-running'
      );
      const ind = document.getElementById(`${prefix}Indicator`);
      ind.className = status === 'Idle' || status.startsWith('Done') ? 'indicator' : 'indicator running';
    }

    function resetPanel(prefix) {
      document.getElementById(`${prefix}Time`).textContent = '0.000s';
      document.getElementById(`${prefix}Count`).textContent = '0';
      document.getElementById(`${prefix}Rate`).textContent = '0';
      setStatus(prefix, 'Idle');
    }

    // ---- SERVER (SSE) ----
    async function startServer() {
      stopServer();
      resetPanel('server');
      showPanel('serverPanel');
      setStatus('server', 'Computing...');
      serverRunning = true;
      startStopwatch('server');

      const limit = getLimit();
      let count = 0;
      serverAbort = new AbortController();

      try {
        const response = await fetch(`/api/primes?limit=${limit}`, {
          signal: serverAbort.signal
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = JSON.parse(line.slice(6));

            if (data.count) {
              count = data.count;
              updateStats('server', count, serverStart);
            }

            if (data.done) {
              stopStopwatch('server');
              const elapsed = performance.now() - serverStart;
              document.getElementById('serverTime').textContent = formatTime(elapsed);
              updateStats('server', count, serverStart);
              setStatus('server', `Done - ${formatTime(elapsed)}`);
              serverRunning = false;
            }
          }
        }
      } catch (e) {
        if (e.name !== 'AbortError') console.error('Server error:', e);
        stopStopwatch('server');
        serverRunning = false;
        setStatus('server', 'Error');
      }
    }

    function stopServer() {
      if (serverAbort) { serverAbort.abort(); serverAbort = null; }
      stopStopwatch('server');
      serverRunning = false;
    }

    // ---- LOCAL (Web Worker with Sieve) ----
    function createWorkerBlob() {
      const code = `
        self.onmessage = function(e) {
          const limit = e.data.limit;

          let upper;
          if (limit < 6) { upper = 15; }
          else { upper = Math.ceil(limit * (Math.log(limit) + Math.log(Math.log(limit)))) + 100; }
          upper = Math.max(upper, 100);

          self.postMessage({ count: 0, done: false, phase: 'Sieving...' });

          const sieve = new Uint8Array(upper + 1);
          sieve[0] = 1; sieve[1] = 1;
          for (let i = 2; i * i <= upper; i++) {
            if (sieve[i] === 0) {
              for (let j = i * i; j <= upper; j += i) sieve[j] = 1;
            }
          }

          self.postMessage({ count: 0, done: false, phase: 'Counting...' });

          let count = 0;
          let lastReport = Date.now();

          for (let i = 2; i <= upper && count < limit; i++) {
            if (sieve[i] === 0) {
              count++;
              const now = Date.now();
              if (now - lastReport >= 1000) {
                self.postMessage({ count: count, done: false });
                lastReport = now;
              }
            }
          }

          self.postMessage({ count: count, done: true });
        };
      `;
      return URL.createObjectURL(new Blob([code], { type: 'application/javascript' }));
    }

    function startLocal() {
      stopLocal();
      resetPanel('local');
      showPanel('localPanel');
      setStatus('local', 'Computing...');
      localRunning = true;
      startStopwatch('local');

      const limit = getLimit();
      const workerUrl = createWorkerBlob();
      localWorker = new Worker(workerUrl);
      URL.revokeObjectURL(workerUrl);

      localWorker.onmessage = function(e) {
        const data = e.data;
        updateStats('local', data.count, localStart);

        if (data.done) {
          stopStopwatch('local');
          const elapsed = performance.now() - localStart;
          document.getElementById('localTime').textContent = formatTime(elapsed);
          updateStats('local', data.count, localStart);
          setStatus('local', `Done - ${formatTime(elapsed)}`);
          localRunning = false;
        }
      };

      localWorker.postMessage({ limit });
    }

    function stopLocal() {
      if (localWorker) { localWorker.terminate(); localWorker = null; }
      stopStopwatch('local');
      localRunning = false;
    }

    // ---- BOTH ----
    function startBoth() {
      startServer();
      startLocal();
    }

    function stopAll() {
      stopServer();
      stopLocal();
    }
  </script>
</body>
</html>
