<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prime Number Calculator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .header {
      text-align: center;
      padding: 30px 20px 20px;
    }

    .header h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #00f5a0, #00d9f5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .header p {
      color: #666;
      font-size: 0.85rem;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 20px;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 28px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-server {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .btn-server:hover:not(:disabled) {
      box-shadow: 0 0 25px rgba(102, 126, 234, 0.5);
    }

    .btn-local {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      color: white;
    }

    .btn-local:hover:not(:disabled) {
      box-shadow: 0 0 25px rgba(245, 87, 108, 0.5);
    }

    .btn-both {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: #0a0a0f;
    }

    .btn-both:hover:not(:disabled) {
      box-shadow: 0 0 25px rgba(79, 172, 254, 0.5);
    }

    .btn-stop {
      background: linear-gradient(135deg, #f44336, #d32f2f);
      color: white;
    }

    .btn-stop:hover:not(:disabled) {
      box-shadow: 0 0 25px rgba(244, 67, 54, 0.5);
    }

    .settings {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 0 20px 15px;
      align-items: center;
    }

    .settings label {
      color: #888;
      font-size: 0.8rem;
    }

    .settings input {
      background: #1a1a2e;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 6px 12px;
      border-radius: 6px;
      width: 100px;
      font-family: inherit;
      font-size: 0.85rem;
    }

    .panels {
      display: flex;
      gap: 12px;
      padding: 0 20px 20px;
      min-height: 60vh;
    }

    .panels.single .panel { flex: 1; }
    .panels.dual .panel { flex: 1; }

    .panel {
      background: #12121a;
      border: 1px solid #1e1e2e;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      display: none;
    }

    .panel.active { display: flex; }

    .panel-header {
      padding: 12px 16px;
      border-bottom: 1px solid #1e1e2e;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .panel-server .panel-title { color: #667eea; }
    .panel-local .panel-title { color: #f5576c; }

    .panel-stats {
      font-size: 0.75rem;
      color: #555;
    }

    .panel-stats span {
      margin-left: 12px;
    }

    .prime-display {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      font-size: 0.85rem;
      line-height: 1.8;
      word-wrap: break-word;
    }

    .prime-display::-webkit-scrollbar { width: 6px; }
    .prime-display::-webkit-scrollbar-track { background: transparent; }
    .prime-display::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    .prime-num {
      display: inline;
      margin-right: 2px;
    }

    .digit {
      display: inline-block;
      opacity: 0;
      animation: digitAppear 0.15s ease-out forwards;
      color: #00f5a0;
    }

    .separator {
      color: #333;
      margin: 0 4px;
    }

    @keyframes digitAppear {
      from { opacity: 0; transform: translateY(-8px) scale(0.5); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .status-bar {
      padding: 8px 16px;
      border-top: 1px solid #1e1e2e;
      font-size: 0.7rem;
      color: #444;
      display: flex;
      justify-content: space-between;
    }

    .running-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00f5a0;
      margin-right: 6px;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .idle-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #444;
      margin-right: 6px;
    }

    @media (max-width: 768px) {
      .panels { flex-direction: column; }
      .header h1 { font-size: 1.5rem; }
      .controls { gap: 8px; }
      button { padding: 10px 18px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Prime Number Calculator</h1>
    <p>Digit-by-digit prime discovery &mdash; server, browser, or both</p>
  </div>

  <div class="settings">
    <label>Count: <input type="number" id="limitInput" value="500" min="10" max="100000"></label>
  </div>

  <div class="controls">
    <button class="btn-server" onclick="startServer()">Server (Vercel)</button>
    <button class="btn-local" onclick="startLocal()">Browser (Local)</button>
    <button class="btn-both" onclick="startBoth()">Both (Race!)</button>
    <button class="btn-stop" onclick="stopAll()">Stop</button>
  </div>

  <div class="panels" id="panels">
    <div class="panel panel-server" id="serverPanel">
      <div class="panel-header">
        <div class="panel-title"><span id="serverIndicator" class="idle-indicator"></span>Server</div>
        <div class="panel-stats">
          <span id="serverCount">0 primes</span>
          <span id="serverTime">0ms</span>
          <span id="serverRate">0 p/s</span>
        </div>
      </div>
      <div class="prime-display" id="serverDisplay"></div>
      <div class="status-bar">
        <span id="serverStatus">Idle</span>
        <span id="serverLast"></span>
      </div>
    </div>

    <div class="panel panel-local" id="localPanel">
      <div class="panel-header">
        <div class="panel-title"><span id="localIndicator" class="idle-indicator"></span>Browser</div>
        <div class="panel-stats">
          <span id="localCount">0 primes</span>
          <span id="localTime">0ms</span>
          <span id="localRate">0 p/s</span>
        </div>
      </div>
      <div class="prime-display" id="localDisplay"></div>
      <div class="status-bar">
        <span id="localStatus">Idle</span>
        <span id="localLast"></span>
      </div>
    </div>
  </div>

  <script>
    let serverAbort = null;
    let localWorker = null;
    let serverRunning = false;
    let localRunning = false;

    function getLimit() {
      return Math.min(Math.max(parseInt(document.getElementById('limitInput').value) || 500, 10), 100000);
    }

    function updatePanelLayout() {
      const panels = document.getElementById('panels');
      const sp = document.getElementById('serverPanel');
      const lp = document.getElementById('localPanel');

      const showServer = serverRunning || sp.classList.contains('has-results');
      const showLocal = localRunning || lp.classList.contains('has-results');

      sp.classList.toggle('active', showServer);
      lp.classList.toggle('active', showLocal);
      panels.classList.toggle('dual', showServer && showLocal);
      panels.classList.toggle('single', showServer !== showLocal);
    }

    // Buffered rendering: queue primes per container, flush via rAF
    const renderQueues = new Map();
    const renderScheduled = new Map();

    function queuePrime(container, primeNum) {
      if (!renderQueues.has(container)) renderQueues.set(container, []);
      renderQueues.get(container).push(primeNum);

      if (!renderScheduled.get(container)) {
        renderScheduled.set(container, true);
        requestAnimationFrame(() => flushRender(container));
      }
    }

    function flushRender(container) {
      renderScheduled.set(container, false);
      const queue = renderQueues.get(container);
      if (!queue || queue.length === 0) return;

      const primes = queue.splice(0, queue.length);
      const frag = document.createDocumentFragment();
      const animateCount = 3; // only animate last N primes for performance
      const animateStart = Math.max(0, primes.length - animateCount);

      for (let p = 0; p < primes.length; p++) {
        const str = primes[p].toString();
        const shouldAnimate = p >= animateStart;

        if (container.childElementCount > 0 || frag.childNodes.length > 0) {
          const sep = document.createElement('span');
          sep.className = 'separator';
          sep.textContent = ',';
          frag.appendChild(sep);
        }

        const span = document.createElement('span');
        span.className = 'prime-num';

        if (shouldAnimate) {
          for (let i = 0; i < str.length; i++) {
            const digit = document.createElement('span');
            digit.className = 'digit';
            digit.textContent = str[i];
            digit.style.animationDelay = `${i * 30}ms`;
            span.appendChild(digit);
          }
        } else {
          span.textContent = str;
          span.style.color = '#00f5a0';
        }

        frag.appendChild(span);
      }

      container.appendChild(frag);
      container.scrollTop = container.scrollHeight;

      // If more queued while we were rendering, schedule again
      if (renderQueues.get(container) && renderQueues.get(container).length > 0) {
        renderScheduled.set(container, true);
        requestAnimationFrame(() => flushRender(container));
      }
    }

    function updateStats(prefix, count, startTime) {
      const elapsed = performance.now() - startTime;
      document.getElementById(`${prefix}Count`).textContent = `${count} primes`;
      document.getElementById(`${prefix}Time`).textContent = `${Math.round(elapsed)}ms`;
      const rate = count > 0 ? Math.round(count / (elapsed / 1000)) : 0;
      document.getElementById(`${prefix}Rate`).textContent = `${rate} p/s`;
    }

    function setRunning(prefix, running) {
      const indicator = document.getElementById(`${prefix}Indicator`);
      const status = document.getElementById(`${prefix}Status`);
      indicator.className = running ? 'running-indicator' : 'idle-indicator';
      status.textContent = running ? 'Computing...' : 'Done';
    }

    // ---- SERVER MODE (SSE) ----
    async function startServer() {
      stopServer();
      const display = document.getElementById('serverDisplay');
      display.innerHTML = '';
      document.getElementById('serverPanel').classList.add('has-results');
      serverRunning = true;
      updatePanelLayout();
      setRunning('server', true);

      const limit = getLimit();
      const startTime = performance.now();
      let count = 0;

      serverAbort = new AbortController();

      try {
        const response = await fetch(`/api/primes?limit=${limit}`, {
          signal: serverAbort.signal
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = JSON.parse(line.slice(6));

            if (data.primes) {
              for (const p of data.primes) {
                queuePrime(display, p);
                count++;
              }
              updateStats('server', count, startTime);
              document.getElementById('serverLast').textContent = `latest: ${data.primes[data.primes.length - 1]}`;
            }

            if (data.done) {
              serverRunning = false;
              setRunning('server', false);
              updateStats('server', count, startTime);
              document.getElementById('serverStatus').textContent = `Done - ${count} primes`;
              updatePanelLayout();
            }
          }
        }
      } catch (e) {
        if (e.name !== 'AbortError') console.error('Server error:', e);
        serverRunning = false;
        setRunning('server', false);
        updatePanelLayout();
      }
    }

    function stopServer() {
      if (serverAbort) { serverAbort.abort(); serverAbort = null; }
      serverRunning = false;
      setRunning('server', false);
      updatePanelLayout();
    }

    // ---- LOCAL MODE (Web Worker) ----
    function createWorkerBlob() {
      const code = `
        self.onmessage = function(e) {
          const limit = e.data.limit;

          // Sieve of Eratosthenes
          let upper;
          if (limit < 6) { upper = 15; }
          else { upper = Math.ceil(limit * (Math.log(limit) + Math.log(Math.log(limit)))) + 100; }
          upper = Math.max(upper, 100);

          const sieve = new Uint8Array(upper + 1);
          sieve[0] = 1; sieve[1] = 1;
          for (let i = 2; i * i <= upper; i++) {
            if (sieve[i] === 0) {
              for (let j = i * i; j <= upper; j += i) sieve[j] = 1;
            }
          }

          let count = 0;
          const batch = [];
          const batchSize = 100;

          for (let i = 2; i <= upper && count < limit; i++) {
            if (sieve[i] === 0) {
              batch.push(i);
              count++;
              if (batch.length >= batchSize) {
                self.postMessage({ primes: batch.slice(), done: false });
                batch.length = 0;
              }
            }
          }

          if (batch.length > 0) {
            self.postMessage({ primes: batch.slice(), done: false });
          }
          self.postMessage({ primes: [], done: true, total: count });
        };
      `;
      return URL.createObjectURL(new Blob([code], { type: 'application/javascript' }));
    }

    function startLocal() {
      stopLocal();
      const display = document.getElementById('localDisplay');
      display.innerHTML = '';
      document.getElementById('localPanel').classList.add('has-results');
      localRunning = true;
      updatePanelLayout();
      setRunning('local', true);

      const limit = getLimit();
      const startTime = performance.now();
      let count = 0;

      const workerUrl = createWorkerBlob();
      localWorker = new Worker(workerUrl);
      URL.revokeObjectURL(workerUrl);

      localWorker.onmessage = function(e) {
        const data = e.data;

        if (data.primes && data.primes.length > 0) {
          for (const p of data.primes) {
            queuePrime(display, p);
            count++;
          }
          updateStats('local', count, startTime);
          document.getElementById('localLast').textContent = `latest: ${data.primes[data.primes.length - 1]}`;
        }

        if (data.done) {
          localRunning = false;
          setRunning('local', false);
          updateStats('local', count, startTime);
          document.getElementById('localStatus').textContent = `Done - ${count} primes`;
          updatePanelLayout();
        }
      };

      localWorker.postMessage({ limit });
    }

    function stopLocal() {
      if (localWorker) { localWorker.terminate(); localWorker = null; }
      localRunning = false;
      setRunning('local', false);
      updatePanelLayout();
    }

    // ---- BOTH MODE ----
    function startBoth() {
      startServer();
      startLocal();
    }

    function stopAll() {
      stopServer();
      stopLocal();
    }
  </script>
</body>
</html>
